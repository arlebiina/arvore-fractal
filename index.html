<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
    <title>Árvore Fractal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Árvore Fractal</h2>
    
    <div class="config">
        <div class="box01">
            <label> Profundidade (nível): <input id="nivel" type="number" value="8" min="1" max="15"> </label> <br>
            <label> Ângulo (graus): <input id="angulo" type="number" value="25" min="0" max="90"> </label> <br>
            <label> Fator de redução: <input id="fator" type="number" value="0.7" min="0.1" max="0.9" step="0.1"></label> <br>
            <button onclick="Desenhar()"> Desenhar </button> <br>
        </div>
        
        <div class="box02">
            <label> Escala: <input id="scala" type="number" value="1.0" min="0.5" max="20" step="0.5"> </label>
            <button onclick="Less()"> - </button>
            <button onclick="Plus()"> + </button>
            <button onclick="Apply()"> Aplicar </button> <br>
            <button onclick="Origem()"> Ir para a origem </button> <br>
        </div>
    </div>

    <canvas id="canvas" width="600" height="600"></canvas> <br>
    <button id="btnSalvar"> Salvar como imagem </button>

    <script src="script.js"></script>
</body>
</html>
